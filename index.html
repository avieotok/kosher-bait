<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>כושר ביתי — מסלול שבועי</title>

<!-- PWA support -->
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#1f2a24">
<meta name="description" content="מסלול אימונים ביתי יומי עם הליכון חשמלי, מותאם לגיל 60+">

<!-- iOS support -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="כושר בבית">
<link rel="apple-touch-icon" href="apple-touch-icon.png">

<!-- Android/Chrome support -->
<meta name="mobile-web-app-capable" content="yes">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@400;500;700;900&family=Heebo:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #f4efe6;
    --cream-dark: #ebe3d4;
    --ink: #1f2a24;
    --moss: #3d5a42;
    --moss-dark: #2a4030;
    --moss-light: #6b8a6f;
    --terra: #c96f4a;
    --terra-dark: #a85838;
    --gold: #b8935a;
    --muted: #7a7565;
    --line: #d6cdbb;
    --success: #4a7c59;
    --shadow-sm: 0 1px 2px rgba(31,42,36,0.06);
    --shadow-md: 0 4px 12px rgba(31,42,36,0.08);
    --shadow-lg: 0 12px 32px rgba(31,42,36,0.12);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--cream);
    color: var(--ink);
    font-family: 'Heebo', sans-serif;
    font-size: 17px;
    line-height: 1.6;
    min-height: 100vh;
  }

  body {
    background-image:
      radial-gradient(circle at 15% 10%, rgba(61,90,66,0.05) 0%, transparent 40%),
      radial-gradient(circle at 85% 90%, rgba(201,111,74,0.04) 0%, transparent 40%);
  }

  .container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 32px 24px 80px;
  }

  /* Header */
  header {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    padding-bottom: 28px;
    border-bottom: 2px solid var(--ink);
    margin-bottom: 40px;
    flex-wrap: wrap;
    gap: 16px;
  }

  .brand {
    display: flex;
    flex-direction: column;
  }

  .brand-sub {
    font-size: 13px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
    font-weight: 500;
  }

  .brand-title {
    font-family: 'Frank Ruhl Libre', serif;
    font-weight: 900;
    font-size: clamp(36px, 5vw, 54px);
    line-height: 1;
    letter-spacing: -0.02em;
  }

  .brand-title span {
    color: var(--moss);
    font-style: italic;
    font-weight: 500;
  }

  .date-card {
    text-align: left;
    direction: rtl;
  }

  .date-today {
    font-family: 'Frank Ruhl Libre', serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--ink);
  }

  .date-greeting {
    font-size: 14px;
    color: var(--muted);
    margin-top: 4px;
  }

  /* Dashboard */
  .dashboard {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 16px;
    margin-bottom: 48px;
  }

  .stat {
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 22px 24px;
    position: relative;
    overflow: hidden;
    box-shadow: var(--shadow-sm);
    transition: transform 0.2s, box-shadow 0.2s;
  }

  .stat:hover {
    transform: translateY(-2px);
    box-shadow: var(--shadow-md);
  }

  .stat::before {
    content: "";
    position: absolute;
    top: 0;
    right: 0;
    width: 4px;
    height: 100%;
    background: var(--moss);
  }

  .stat.accent::before { background: var(--terra); }
  .stat.gold::before { background: var(--gold); }
  .stat.treadmill::before { background: var(--moss-light); }

  .stat-label {
    font-size: 12px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 500;
    margin-bottom: 8px;
  }

  .stat-value {
    font-family: 'Frank Ruhl Libre', serif;
    font-size: 42px;
    font-weight: 700;
    line-height: 1;
    color: var(--ink);
  }

  .stat-unit {
    font-size: 14px;
    color: var(--muted);
    margin-right: 6px;
    font-family: 'Heebo', sans-serif;
    font-weight: 400;
  }

  .stat-sub {
    font-size: 13px;
    color: var(--muted);
    margin-top: 6px;
  }

  /* Week progress */
  .week-progress {
    background: var(--ink);
    color: var(--cream);
    border-radius: 16px;
    padding: 28px 32px;
    margin-bottom: 48px;
    position: relative;
    overflow: hidden;
  }

  .week-progress::after {
    content: "";
    position: absolute;
    top: -40px;
    left: -40px;
    width: 180px;
    height: 180px;
    background: radial-gradient(circle, rgba(201,111,74,0.25) 0%, transparent 70%);
    pointer-events: none;
  }

  .week-title {
    font-family: 'Frank Ruhl Libre', serif;
    font-size: 24px;
    margin-bottom: 18px;
    font-weight: 500;
  }

  .week-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 10px;
    position: relative;
    z-index: 1;
  }

  .day-cell {
    background: rgba(244,239,230,0.06);
    border: 1px solid rgba(244,239,230,0.15);
    border-radius: 10px;
    padding: 14px 8px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
  }

  .day-cell:not(.rest):hover {
    background: rgba(244,239,230,0.12);
    transform: translateY(-2px);
  }

  .day-cell.active {
    background: var(--terra);
    border-color: var(--terra);
  }

  .day-cell.done {
    background: var(--moss-light);
    border-color: var(--moss-light);
  }

  .day-cell.rest {
    background: rgba(244,239,230,0.03);
    opacity: 0.55;
    cursor: default;
  }

  .day-name {
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    opacity: 0.7;
    font-weight: 500;
  }

  .day-num {
    font-family: 'Frank Ruhl Libre', serif;
    font-size: 22px;
    font-weight: 700;
    margin-top: 4px;
  }

  .day-status {
    font-size: 10px;
    margin-top: 4px;
    opacity: 0.85;
  }

  /* Workout area */
  .workout-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    margin-bottom: 24px;
    flex-wrap: wrap;
    gap: 12px;
  }

  .workout-title-wrap {
    display: flex;
    flex-direction: column;
  }

  .workout-eyebrow {
    font-size: 13px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--terra);
    font-weight: 500;
  }

  .workout-title {
    font-family: 'Frank Ruhl Libre', serif;
    font-size: clamp(28px, 4vw, 40px);
    font-weight: 700;
    line-height: 1.1;
    margin-top: 4px;
  }

  .workout-meta {
    display: flex;
    gap: 20px;
    color: var(--muted);
    font-size: 14px;
  }

  .workout-meta strong {
    color: var(--ink);
    font-weight: 700;
    font-family: 'Frank Ruhl Libre', serif;
    font-size: 18px;
    margin-left: 4px;
  }

  /* Exercise table */
  .exercise-table {
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 14px;
    overflow: hidden;
    box-shadow: var(--shadow-md);
    margin-bottom: 40px;
  }

  .table-head {
    display: grid;
    grid-template-columns: 50px 2fr 0.8fr 0.8fr 60px 60px;
    background: var(--cream-dark);
    padding: 14px 20px;
    font-size: 12px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 500;
    border-bottom: 1px solid var(--line);
  }

  .table-row {
    display: grid;
    grid-template-columns: 50px 2fr 0.8fr 0.8fr 60px 60px;
    padding: 18px 20px;
    align-items: center;
    border-bottom: 1px solid var(--line);
    transition: background 0.15s;
  }

  .demo-btn {
    width: 44px;
    height: 44px;
    border-radius: 10px;
    border: none;
    background: linear-gradient(135deg, #fff 0%, var(--cream) 100%);
    border: 1.5px solid var(--line);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    position: relative;
  }

  .demo-btn:hover {
    background: var(--terra);
    border-color: var(--terra);
    transform: scale(1.08);
    box-shadow: var(--shadow-md);
  }

  .demo-btn:hover svg { fill: #fff; }

  .demo-btn svg {
    width: 18px;
    height: 18px;
    fill: var(--terra);
    transition: fill 0.2s;
    margin-right: 2px;
  }

  .demo-btn::after {
    content: "צפה בהדגמה";
    position: absolute;
    bottom: calc(100% + 8px);
    right: 50%;
    transform: translateX(50%);
    background: var(--ink);
    color: var(--cream);
    padding: 6px 10px;
    border-radius: 6px;
    font-size: 12px;
    white-space: nowrap;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
    z-index: 10;
  }

  .demo-btn:hover::after { opacity: 1; }

  /* Modal */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(31,42,36,0.7);
    backdrop-filter: blur(4px);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 20px;
    animation: fadeIn 0.2s ease-out;
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .modal {
    background: var(--cream);
    border-radius: 20px;
    max-width: 640px;
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    animation: slideUp 0.3s ease-out;
    position: relative;
  }

  .modal-close {
    position: absolute;
    top: 16px;
    left: 16px;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: none;
    background: rgba(31,42,36,0.08);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    color: var(--ink);
    transition: all 0.2s;
    z-index: 2;
  }

  .modal-close:hover {
    background: rgba(31,42,36,0.15);
    transform: scale(1.1);
  }

  .modal-hero {
    background: linear-gradient(135deg, var(--ink) 0%, var(--moss-dark) 100%);
    padding: 32px 32px 24px;
    color: var(--cream);
    position: relative;
    overflow: hidden;
  }

  .modal-hero::after {
    content: "";
    position: absolute;
    top: -60px;
    right: -60px;
    width: 200px;
    height: 200px;
    background: radial-gradient(circle, rgba(201,111,74,0.25) 0%, transparent 70%);
  }

  .modal-eyebrow {
    font-size: 12px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--terra);
    font-weight: 500;
    margin-bottom: 6px;
  }

  .modal-title {
    font-family: 'Frank Ruhl Libre', serif;
    font-size: 28px;
    font-weight: 700;
    line-height: 1.2;
    position: relative;
    z-index: 1;
  }

  .modal-diagram {
    background: #fff;
    padding: 24px;
    display: flex;
    justify-content: center;
    align-items: center;
    border-bottom: 1px solid var(--line);
  }

  .modal-diagram svg {
    max-width: 100%;
    height: auto;
    max-height: 200px;
  }

  .modal-body {
    padding: 28px 32px;
  }

  .modal-section {
    margin-bottom: 24px;
  }

  .modal-section:last-child { margin-bottom: 0; }

  .modal-section-title {
    font-family: 'Frank Ruhl Libre', serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--moss-dark);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .modal-section-title .icon {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: var(--cream-dark);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
  }

  .modal-steps {
    list-style: none;
    counter-reset: step;
  }

  .modal-steps li {
    counter-increment: step;
    padding: 10px 0 10px 44px;
    position: relative;
    font-size: 15px;
    line-height: 1.6;
    border-bottom: 1px dashed var(--line);
  }

  .modal-steps li:last-child { border-bottom: none; }

  .modal-steps li::before {
    content: counter(step);
    position: absolute;
    right: 0;
    top: 10px;
    width: 28px;
    height: 28px;
    background: var(--moss);
    color: #fff;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Frank Ruhl Libre', serif;
    font-size: 14px;
    font-weight: 600;
  }

  .modal-callout {
    padding: 14px 18px;
    border-radius: 10px;
    font-size: 14px;
    line-height: 1.6;
    display: flex;
    gap: 12px;
    align-items: flex-start;
  }

  .modal-callout.tip {
    background: rgba(74,124,89,0.12);
    border-right: 3px solid var(--success);
  }

  .modal-callout.warn {
    background: rgba(201,111,74,0.12);
    border-right: 3px solid var(--terra);
  }

  .modal-callout .emoji { font-size: 20px; }

  .modal-youtube {
    background: #fff;
    padding: 20px 32px 28px;
    border-top: 1px solid var(--line);
  }

  .yt-btn {
    width: 100%;
    background: #FF0000;
    color: #fff;
    border: none;
    padding: 14px 20px;
    font-family: 'Heebo', sans-serif;
    font-size: 15px;
    font-weight: 500;
    border-radius: 10px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    transition: all 0.2s;
  }

  .yt-btn:hover {
    background: #cc0000;
    transform: translateY(-1px);
    box-shadow: var(--shadow-md);
  }

  .yt-btn svg { width: 22px; height: 22px; fill: #fff; }

  @media (max-width: 560px) {
    .modal-hero { padding: 28px 24px 20px; }
    .modal-title { font-size: 22px; }
    .modal-body { padding: 24px 24px; }
    .modal-youtube { padding: 16px 24px 24px; }
  }

  /* Tab Navigation */
  .tabs {
    display: flex;
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 6px;
    margin-bottom: 32px;
    gap: 4px;
    box-shadow: var(--shadow-sm);
  }

  .tab {
    flex: 1;
    background: transparent;
    border: none;
    padding: 12px 16px;
    border-radius: 8px;
    font-family: 'Heebo', sans-serif;
    font-size: 14px;
    font-weight: 500;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .tab:hover {
    background: var(--cream);
    color: var(--ink);
  }

  .tab.active {
    background: var(--ink);
    color: var(--cream);
  }

  .tab svg { width: 18px; height: 18px; }

  /* Notes */
  .notes-section {
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 24px 28px;
    margin-top: 32px;
    box-shadow: var(--shadow-sm);
  }

  .notes-title {
    font-family: 'Frank Ruhl Libre', serif;
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .notes-title .icon { font-size: 24px; }

  .notes-input {
    width: 100%;
    min-height: 100px;
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 14px 16px;
    font-family: 'Heebo', sans-serif;
    font-size: 15px;
    line-height: 1.6;
    color: var(--ink);
    background: var(--cream);
    resize: vertical;
    transition: border 0.2s, background 0.2s;
    direction: rtl;
  }

  .notes-input:focus {
    outline: none;
    border-color: var(--moss);
    background: #fff;
  }

  .notes-status {
    font-size: 12px;
    color: var(--muted);
    margin-top: 10px;
    height: 16px;
  }

  .notes-status.saved { color: var(--success); }

  /* Progress view */
  .progress-section {
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 28px 32px;
    margin-bottom: 28px;
    box-shadow: var(--shadow-sm);
  }

  .progress-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    margin-bottom: 24px;
    flex-wrap: wrap;
    gap: 12px;
  }

  .progress-title {
    font-family: 'Frank Ruhl Libre', serif;
    font-size: 24px;
    font-weight: 700;
  }

  .progress-toggle {
    display: flex;
    gap: 4px;
    background: var(--cream-dark);
    padding: 4px;
    border-radius: 8px;
  }

  .progress-toggle button {
    background: transparent;
    border: none;
    padding: 8px 14px;
    font-family: 'Heebo', sans-serif;
    font-size: 13px;
    font-weight: 500;
    color: var(--muted);
    cursor: pointer;
    border-radius: 6px;
    transition: all 0.2s;
  }

  .progress-toggle button.active {
    background: #fff;
    color: var(--ink);
    box-shadow: var(--shadow-sm);
  }

  .chart-container {
    width: 100%;
    height: 280px;
    overflow: visible;
  }

  .chart-svg { width: 100%; height: 100%; }

  .chart-bar {
    fill: var(--moss);
    transition: fill 0.2s, opacity 0.2s;
    cursor: pointer;
  }

  .chart-bar:hover { fill: var(--terra); }

  .chart-bar.current {
    fill: var(--terra);
  }

  .chart-label {
    font-family: 'Heebo', sans-serif;
    font-size: 11px;
    fill: var(--muted);
  }

  .chart-value {
    font-family: 'Frank Ruhl Libre', serif;
    font-size: 13px;
    font-weight: 700;
    fill: var(--ink);
  }

  .chart-grid {
    stroke: var(--line);
    stroke-width: 1;
    stroke-dasharray: 3 3;
  }

  .progress-summary {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 14px;
    margin-top: 28px;
    padding-top: 24px;
    border-top: 1px solid var(--line);
  }

  .summary-item {
    text-align: center;
  }

  .summary-value {
    font-family: 'Frank Ruhl Libre', serif;
    font-size: 32px;
    font-weight: 700;
    color: var(--moss-dark);
    line-height: 1;
  }

  .summary-label {
    font-size: 12px;
    color: var(--muted);
    margin-top: 6px;
    letter-spacing: 0.05em;
  }

  /* History entries */
  .history-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .history-entry {
    background: var(--cream);
    border-radius: 10px;
    padding: 16px 20px;
    border-right: 3px solid var(--moss);
  }

  .history-date {
    font-family: 'Frank Ruhl Libre', serif;
    font-weight: 700;
    margin-bottom: 6px;
  }

  .history-note {
    color: var(--ink);
    font-size: 14px;
    line-height: 1.6;
  }

  .history-empty {
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
  }

  /* Settings */
  .settings-section {
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 32px;
    margin-bottom: 28px;
    box-shadow: var(--shadow-sm);
  }

  .settings-title {
    font-family: 'Frank Ruhl Libre', serif;
    font-size: 24px;
    font-weight: 700;
    margin-bottom: 8px;
  }

  .settings-desc {
    color: var(--muted);
    font-size: 14px;
    line-height: 1.6;
    margin-bottom: 24px;
  }

  .setting-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 0;
    border-top: 1px solid var(--line);
    flex-wrap: wrap;
    gap: 12px;
  }

  .setting-label {
    font-weight: 500;
    font-size: 15px;
  }

  .setting-desc {
    font-size: 13px;
    color: var(--muted);

// ============ STORAGE ============
async function loadState() {
  try {
    if (window.storage) {
      const result = await window.storage.get('fitness_state');
      if (result && result.value) {
        const saved = JSON.parse(result.value);
        state = {
          ...state,
          ...saved,
          viewingDate: new Date().toISOString().split('T')[0],
          currentView: 'today',
        };
      }
    }
  } catch (e) {
    // Key not found or error - use default state
  }
}

async function saveState() {
  try {
    if (window.storage) {
      await window.storage.set('fitness_state', JSON.stringify({
        completions: state.completions,
        notes: state.notes,
        reminder: state.reminder,
      }));
    }
  } catch (e) {
    console.error('Save failed:', e);
  }
}

// ============ HELPERS ============
function getDateForDayOfWeek(dayOfWeek) {
  const today = new Date();
  const currentDow = today.getDay();
  const diff = dayOfWeek - currentDow;
  const target = new Date(today);
  target.setDate(today.getDate() + diff);
  return target.toISOString().split('T')[0];
}

function getWeekDates() {
  const today = new Date();
  const currentDow = today.getDay();
  const sunday = new Date(today);
  sunday.setDate(today.getDate() - currentDow);
  return Array.from({ length: 7 }, (_, i) => {
    const d = new Date(sunday);
    d.setDate(sunday.getDate() + i);
    return d.toISOString().split('T')[0];
  });
}

function formatDateHebrew(dateStr) {
  const d = new Date(dateStr);
  const day = HEBREW_DAYS[d.getDay()];
  const dom = d.getDate();
  const months = ['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];
  return `יום ${day}, ${dom} ב${months[d.getMonth()]}`;
}

function getGreeting() {
  const h = new Date().getHours();
  if (h < 12) return 'בוקר טוב! מוכן לאימון?';
  if (h < 17) return 'צהריים טובים! קדימה נתחיל.';

}

function isWorkoutDone(date) {
  return state.completions[date]?.completed === true;
}

function getExerciseCompletions(date) {
  return state.completions[date]?.exerciseIndexes || [];
}

function calcStats() {
  const weekDates = getWeekDates();
  const workoutDates = weekDates.slice(0, 5); // Sun-Thu
  const completedThisWeek = workoutDates.filter(d => isWorkoutDone(d)).length;

  // Streak: count consecutive completed workouts backward from today (skipping rest days)
  let streak = 0;
  const today = new Date();
  for (let i = 0; i < 90; i++) {
    const d = new Date(today);
    d.setDate(today.getDate() - i);
    const dow = d.getDay();
    if (dow === 5 || dow === 6) continue; // skip Fri/Sat
    const dateStr = d.toISOString().split('T')[0];
    if (isWorkoutDone(dateStr)) {
      streak++;
    } else if (i > 0) {
      break;
    } else if (i === 0) {
      // today not done yet - don't break, continue counting past days
      continue;
    }
  }

  // Total workouts ever
  const totalDone = Object.values(state.completions).filter(c => c.completed).length;

  // Treadmill stats this week: sum minutes and distance from completed treadmill exercises
  let treadmillMinutes = 0;
  let treadmillKm = 0;
  workoutDates.forEach((date, idx) => {
    const dow = idx; // 0..4 = Sun..Thu
    const workout = WORKOUTS[dow];
    if (!workout.exercises) return;
    const doneIdx = getExerciseCompletions(date);
    workout.exercises.forEach((ex, i) => {
      if (ex.treadmill && doneIdx.includes(i)) {
        treadmillMinutes += ex.treadmill.minutes;
        treadmillKm += (ex.treadmill.speed * ex.treadmill.minutes) / 60;
      }
    });
  });

  return { completedThisWeek, streak, totalDone, treadmillMinutes, treadmillKm: treadmillKm.toFixed(1) };
}

// Calculate weekly stats for last N weeks
function calcWeekHistory(weeksBack = 8) {
  const today = new Date();
  const currentDow = today.getDay();
  const thisSunday = new Date(today);
  thisSunday.setDate(today.getDate() - currentDow);
  thisSunday.setHours(0, 0, 0, 0);

  const weeks = [];
  for (let w = weeksBack - 1; w >= 0; w--) {
    const weekStart = new Date(thisSunday);
    weekStart.setDate(thisSunday.getDate() - (w * 7));

    let workouts = 0;
    let km = 0;
    let minutes = 0;

    // Check each workout day (Sun-Thu) of this week
    for (let d = 0; d < 5; d++) {
      const date = new Date(weekStart);
      date.setDate(weekStart.getDate() + d);
      const dateStr = date.toISOString().split('T')[0];
      const workout = WORKOUTS[d];

      if (isWorkoutDone(dateStr)) workouts++;

      // Treadmill stats
      if (workout.exercises) {
        const doneIdx = getExerciseCompletions(dateStr);
        workout.exercises.forEach((ex, i) => {
          if (ex.treadmill && doneIdx.includes(i)) {
            minutes += ex.treadmill.minutes;
            km += (ex.treadmill.speed * ex.treadmill.minutes) / 60;
          }
        });
      }
    }

    weeks.push({
      startDate: weekStart.toISOString().split('T')[0],
      label: `${weekStart.getDate()}/${weekStart.getMonth() + 1}`,
      workouts,
      km: Math.round(km * 10) / 10,
      minutes,
      isCurrent: w === 0,
    });
  }

  return weeks;
}

function renderChart(weeks, metric) {
  // Chart dimensions
  const W = 600, H = 240;
  const padL = 40, padR = 20, padT = 20, padB = 50;
  const chartW = W - padL - padR;
  const chartH = H - padT - padB;

  const values = weeks.map(w => metric === 'km' ? w.km : w.workouts);
  const maxVal = Math.max(...values, metric === 'km' ? 10 : 5);
  const niceMax = Math.ceil(maxVal / 5) * 5 || 5;

  const barWidth = chartW / weeks.length * 0.65;
  const barGap = chartW / weeks.length * 0.35;
  const xStep = chartW / weeks.length;

  // Grid lines (5 horizontal)
  const gridCount = 5;
  const gridLines = [];
  for (let i = 0; i <= gridCount; i++) {
    const y = padT + (chartH / gridCount) * i;
    const value = niceMax - (niceMax / gridCount) * i;
    gridLines.push({ y, value: Math.round(value * 10) / 10 });
  }

  return `
    <svg class="chart-svg" viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet">
      <!-- Grid lines -->
      ${gridLines.map(g => `
        <line class="chart-grid" x1="${padL}" y1="${g.y}" x2="${W - padR}" y2="${g.y}"/>
        <text class="chart-label" x="${padL - 8}" y="${g.y + 4}" text-anchor="end">${g.value}</text>
      `).join('')}

      <!-- Bars -->
      ${weeks.map((w, i) => {
        const value = metric === 'km' ? w.km : w.workouts;
        const barH = (value / niceMax) * chartH;
        const x = padL + xStep * i + barGap / 2;
        const y = padT + chartH - barH;
        const displayValue = metric === 'km' ? (value > 0 ? value.toFixed(1) : '') : (value > 0 ? value : '');

        return `
          <rect class="chart-bar ${w.isCurrent ? 'current' : ''}"
                x="${x}" y="${y}" width="${barWidth}" height="${barH}"
                rx="4" ry="4"/>
          ${value > 0 ? `<text class="chart-value" x="${x + barWidth/2}" y="${y - 6}" text-anchor="middle">${displayValue}</text>` : ''}
          <text class="chart-label" x="${x + barWidth/2}" y="${H - padB + 18}" text-anchor="middle">${w.label}</text>
          ${w.isCurrent ? `<text class="chart-label" x="${x + barWidth/2}" y="${H - padB + 34}" text-anchor="middle" style="fill: var(--terra); font-weight: 600;">השבוע</text>` : ''}
        `;
      }).join('')}

      <!-- Y axis label -->
      <text class="chart-label" x="${padL - 8}" y="${padT - 8}" text-anchor="end" style="font-weight: 600;">${metric === 'km' ? 'ק״מ' : 'ימים'}</text>
    </svg>
  `;
}

function renderTodayView() {
  const todayDate = new Date().toISOString().split('T')[0];
  const viewingDate = state.viewingDate;
  const d = new Date(viewingDate);
  const dow = d.getDay();
  const workout = WORKOUTS[dow];
  const stats = calcStats();
  const weekDates = getWeekDates();
  const currentNote = state.notes[viewingDate] || '';

  return `
    <section class="dashboard">
      <div class="stat">
        <div class="stat-label">השבוע</div>
        <div class="stat-value">${stats.completedThisWeek}<span class="stat-unit">/ 5</span></div>
        <div class="stat-sub">ימי אימון שבוצעו</div>
      </div>
      <div class="stat accent">
        <div class="stat-label">רצף</div>
        <div class="stat-value">${stats.streak}<span class="stat-unit">ימים</span></div>
        <div class="stat-sub">אימונים רצופים</div>
      </div>
      <div class="stat treadmill">
        <div class="stat-label">הליכון השבוע</div>
        <div class="stat-value">${stats.treadmillKm}<span class="stat-unit">ק״מ</span></div>
        <div class="stat-sub">${stats.treadmillMinutes} דקות הליכה</div>
      </div>
      <div class="stat gold">
        <div class="stat-label">סה״כ</div>
        <div class="stat-value">${stats.totalDone}</div>
        <div class="stat-sub">אימונים בוצעו</div>
      </div>
    </section>

    <section class="week-progress">
      <div class="week-title">השבוע שלך במבט מהיר</div>
      <div class="week-grid">
        ${weekDates.map((date, idx) => {
          const dayOfWeek = idx;
          const isRest = dayOfWeek === 5 || dayOfWeek === 6;
          const done = isWorkoutDone(date);
          const isToday = date === todayDate;
          const isViewing = date === viewingDate;
          let cls = 'day-cell';
          if (isRest) cls += ' rest';
          if (done) cls += ' done';
          if (isViewing && !isRest) cls += ' active';
          const dNum = new Date(date).getDate();
          return `
            <div class="${cls}" ${!isRest ? `onclick="selectDay('${date}')"` : ''}>
              <div class="day-name">${HEBREW_DAYS_SHORT[dayOfWeek]}</div>

              <div class="day-status">${isRest ? 'מנוחה' : done ? '✓ בוצע' : isToday ? 'היום' : ''}</div>
            </div>
          `;
        }).join('')}
      </div>
    </section>

    ${workout.rest ? renderRestDay(workout) : renderWorkoutDay(workout, viewingDate)}

    ${!workout.rest ? `
      <div class="notes-section">
        <div class="notes-title">
          <span class="icon">📝</span>
          <span>הערות אישיות ליום זה</span>

                  placeholder="איך הרגשת היום? מה היה קשה? מה היה קל? רשום כאן כל מחשבה או תובנה..."
                  oninput="handleNoteInput('${viewingDate}')"
                  onblur="saveNote('${viewingDate}')">${currentNote}</textarea>
        <div class="notes-status" id="notes-status"></div>
      </div>
    ` : ''}
  `;
}

function renderProgressView() {
  const metric = state.progressMetric || 'km';
  const weekHistory = calcWeekHistory(8); // last 8 weeks
  const notes = Object.entries(state.notes)
    .filter(([k, v]) => v && v.trim())
    .sort((a, b) => b[0].localeCompare(a[0]))
    .slice(0, 10);

  const totalKm = weekHistory.reduce((sum, w) => sum + w.km, 0).toFixed(1);
  const totalWorkouts = weekHistory.reduce((sum, w) => sum + w.workouts, 0);
  const avgWorkoutsPerWeek = weekHistory.filter(w => w.workouts > 0).length > 0
    ? (totalWorkouts / weekHistory.filter(w => w.workouts > 0).length).toFixed(1)
    : '0';
  const stats = calcStats();

  return `
    <div class="progress-section">
      <div class="progress-header">
        <div>
          <div class="progress-title">התקדמות לאורך זמן</div>
          <div style="color: var(--muted); font-size: 14px; margin-top: 4px;">8 השבועות האחרונים</div>
        </div>
        <div class="progress-toggle">
          <button class="${metric === 'km' ? 'active' : ''}" onclick="setProgressMetric('km')">ק״מ הליכון</button>
          <button class="${metric === 'workouts' ? 'active' : ''}" onclick="setProgressMetric('workouts')">אימונים</button>
        </div>
      </div>

      <div class="chart-container">
        ${renderChart(weekHistory, metric)}
      </div>

      <div class="progress-summary">
        <div class="summary-item">
          <div class="summary-value">${totalKm}</div>
          <div class="summary-label">ק״מ ב-8 שבועות</div>
        </div>
        <div class="summary-item">
          <div class="summary-value">${totalWorkouts}</div>
          <div class="summary-label">אימונים ב-8 שבועות</div>
        </div>
        <div class="summary-item">
          <div class="summary-value">${avgWorkoutsPerWeek}</div>
          <div class="summary-label">ממוצע אימונים לשבוע</div>
        </div>
        <div class="summary-item">
          <div class="summary-value">${stats.streak}</div>
          <div class="summary-label">רצף נוכחי (ימים)</div>
        </div>
      </div>
    </div>

    <div class="progress-section">
      <div class="progress-title" style="margin-bottom: 16px;">הערות אחרונות</div>
      ${notes.length === 0 ? `
        <div class="history-empty">
          עדיין לא כתבת הערות. הערות שתכתוב במסך "אימון היום" יופיעו כאן.
        </div>
      ` : `
        <div class="history-list">
          ${notes.map(([date, text]) => `

              <div class="history-note">${escapeHtml(text)}</div>

          `).join('')}
        </div>
      `}
    </div>
  `;
}

  return `
    <div class="settings-section">
      <div class="settings-title">תזכורות אימון</div>
      <div class="settings-desc">
        קבע שעה קבועה לתזכורת יומית. בימי אימון (ראשון-חמישי) תקבל הודעה בדפדפן בזמן שהגדרת.
      </div>

      <div class="setting-row" style="border-top: none; padding-top: 0;">
        <div>
          <div class="setting-label">הפעל תזכורות</div>

        </div>
        <label class="toggle">
          <input type="checkbox" ${reminder.enabled ? 'checked' : ''} onchange="toggleReminder(this.checked)">

      </div>

      <div class="setting-row">
        <div>
          <div class="setting-label">שעת התזכורת</div>

      </div>

      <div class="setting-row">
        <div>
          <div class="setting-label">בדיקת התראה</div>
          <div class="setting-desc">שלח לעצמך התראה עכשיו כדי לוודא שזה עובד</div>
        </div>

      <div class="perm-status ${permClass}">${permText}</div>

      <div style="background: var(--cream-dark); padding: 14px 18px; border-radius: 10px; margin-top: 20px; font-size: 13px; line-height: 1.6; color: var(--muted);">
        <strong style="color: var(--ink);">שים לב:</strong> תזכורות עובדות רק כשהאפליקציה פתוחה בדפדפן. לתזכורות אמיתיות גם כשסגור, תצטרך אפליקציית טלפון ייעודית.
      </div>
    </div>

    <div class="settings-section">
      <div class="settings-title">על האפליקציה</div>
      <div class="settings-desc">
        אפליקציה זו מיועדת לאימונים ביתיים בגיל 60+. התרגילים נבחרו בקפידה להיות בטוחים, אפקטיביים וללא צורך בציוד מיוחד (מלבד הליכון).
      </div>
      <div class="setting-row" style="border-top: 1px solid var(--line);">
        <div>
          <div class="setting-label">ייעוץ רפואי</div>
          <div class="setting-desc">לפני התחלת כל תוכנית חדשה — בדוק עם רופא המשפחה</div>
        </div>
      </div>

  `;
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function renderRestDay(workout) {
  return `
    <div class="rest-view">
      <div class="rest-icon">🌿</div>
      <div class="rest-title">${workout.title} — יום מנוחה</div>
      <div class="rest-body">
        ${workout.note}.<br>
        המנוחה חשובה לא פחות מהאימון — בה הגוף בונה את עצמו חזק יותר.
        השתדל לישון היטב, לשתות מים, ולעשות הליכה קלה אם מתחשק.
      </div>
    </div>
  `;
}

  const doneIndexes = getExerciseCompletions(date);

  const workoutCompleted = isWorkoutDone(date);

  return `
    <div class="workout-header">
      <div class="workout-title-wrap">
        <div class="workout-eyebrow">${workout.eyebrow}</div>
        <div class="workout-title">${workout.title}</div>
      </div>
      <div class="workout-meta">
        <div>משך: <strong>${workout.duration}</strong></div>
        <div>עצימות: <strong>${workout.intensity}</strong></div>
      </div>
    </div>

    <div class="tips">
      <div class="tips-title">💡 טיפ לאימון</div>
      <div class="tips-body">${workout.tip}</div>

      <div class="table-head">
        <div>#</div>
        <div>תרגיל</div>
        <div>סטים</div>

        const treadmillBadge = tm ? `

            <svg viewBox="0 0 24 24"><path d="M4 18V6h2v12H4zm4-2V8c0-.55.45-1 1-1h11c.55 0 1 .45 1 1v8c0 .55-.45 1-1 1H9c-.55 0-1-.45-1-1zm2-1h9V9h-9v6zM4 20h16v1H4z"/></svg>
            הליכון · <span>${tm.speed}</span> קמ"ש · שיפוע <span>${tm.incline}%</span> · <span>${tm.minutes}</span> דק'

        return `
          <div class="table-row ${checked ? 'done' : ''}">
            <div class="ex-num">${String(i+1).padStart(2,'0')}</div>

                <span>${ex.sets} סטים</span>
                <span>${ex.reps}</span>

            <div class="ex-cell desktop-only">${ex.reps}</div>

              <svg viewBox="0 0 24 24">
                <path d="M8 5v14l11-7z"/>
              </svg>
            </button>
            <button class="check-btn ${checked ? 'checked' : ''}" onclick="toggleExercise('${date}', ${i})" aria-label="סמן כבוצע">

              </svg>
            </button>
          </div>

    </div>

    <div class="complete-wrap">
      <div class="complete-status">
        ${doneIndexes.length} מתוך ${workout.exercises.length} תרגילים בוצעו
      </div>
      <button class="complete-btn ${workoutCompleted ? 'done' : ''}"
              onclick="completeWorkout('${date}')"
              ${!allDone && !workoutCompleted ? 'disabled' : ''}>
        ${workoutCompleted ? '✓ האימון הושלם' : 'סיים את האימון'}
      </button>
    </div>
  `;
}

// ============ ACTIONS ============
function selectDay(date) {
  state.viewingDate = date;
  render();
}

async function toggleExercise(date, exIdx) {
  if (!state.completions[date]) {
    state.completions[date] = { exerciseIndexes: [], completed: false };
  }
  const arr = state.completions[date].exerciseIndexes;
  const i = arr.indexOf(exIdx);
  if (i >= 0) arr.splice(i, 1);
  else arr.push(exIdx);
  await saveState();
  render();
}

async function completeWorkout(date) {
  if (!state.completions[date]) {
    state.completions[date] = { exerciseIndexes: [], completed: false };
  }
  state.completions[date].completed = !state.completions[date].completed;
  await saveState();
  render();
}

async function resetData() {
  if (confirm('האם לאפס את כל הנתונים? פעולה זו בלתי הפיכה.')) {
    state.completions = {};
    state.notes = {};
    await saveState();
    render();
  }
}

// View switching
function switchView(view) {
  state.currentView = view;
  render();
}

function setProgressMetric(metric) {
  state.progressMetric = metric;
  render();
}

// Notes handling with debouncing
let noteSaveTimer = null;
function handleNoteInput(date) {
  const input = document.getElementById('notes-input');
  const status = document.getElementById('notes-status');
  if (!input) return;

  status.textContent = 'כותב...';
  status.className = 'notes-status';

  clearTimeout(noteSaveTimer);
  noteSaveTimer = setTimeout(() => saveNote(date), 800);
}

async function saveNote(date) {
  const input = document.getElementById('notes-input');
  const status = document.getElementById('notes-status');
  if (!input) return;

  const value = input.value;
  if (value && value.trim()) {
    state.notes[date] = value;
  } else {
    delete state.notes[date];
  }
  await saveState();

  if (status) {
    status.textContent = '✓ נשמר';
    status.className = 'notes-status saved';
    setTimeout(() => {
      if (status) { status.textContent = ''; status.className = 'notes-status'; }
    }, 2000);
  }
}

// Reminder handling
async function toggleReminder(enabled) {
  if (enabled && typeof Notification !== 'undefined' && Notification.permission === 'default') {
    const perm = await Notification.requestPermission();
    if (perm !== 'granted') {
      state.reminder.enabled = false;
      await saveState();
      render();
      alert('לא ניתן לאישור התראות. ניתן לאפשר בהגדרות הדפדפן ולנסות שוב.');
      return;
    }
  }
  state.reminder.enabled = enabled;
  await saveState();
  scheduleReminder();
  render();
}

async function setReminderTime(time) {
  state.reminder.time = time;
  await saveState();
  scheduleReminder();
}

function testNotification() {
  if (typeof Notification === 'undefined') {
    alert('הדפדפן שלך לא תומך בהתראות.');
    return;
  }
  if (Notification.permission === 'denied') {
    alert('ההתראות חסומות בדפדפן. אפשר אותן בהגדרות הדפדפן.');
    return;
  }
  if (Notification.permission === 'default') {
    Notification.requestPermission().then(perm => {
      if (perm === 'granted') showTestNotification();
      render();
    });
    return;
  }
  showTestNotification();
}

function showTestNotification() {
  try {
    new Notification('🏋️ זמן להתאמן!', {
      body: 'זה נראה כמו התראה אמיתית. ככה תראה התזכורת בזמן שקבעת.',
      icon: 'data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%233d5a42"%3E%3Cpath d="M20.57 14.86L22 13.43 20.57 12 17 15.57 8.43 7 12 3.43 10.57 2 9.14 3.43 7.71 2 5.57 4.14 4.14 2.71 2.71 4.14l1.43 1.43L2 7.71l1.43 1.43L2 10.57 3.43 12 7 8.43 15.57 17 12 20.57 13.43 22l1.43-1.43L16.29 22l2.14-2.14 1.43 1.43 1.43-1.43-1.43-1.43L22 16.29z"/%3E%3C/svg%3E',
    });
  } catch (e) {
    alert('לא ניתן להציג התראה: ' + e.message);
  }
}

// Schedule the daily reminder
let reminderTimeout = null;
function scheduleReminder() {
  if (reminderTimeout) clearTimeout(reminderTimeout);

  const r = state.reminder;
  if (!r || !r.enabled || typeof Notification === 'undefined') return;
  if (Notification.permission !== 'granted') return;

  const [hours, minutes] = r.time.split(':').map(Number);
  const now = new Date();
  const target = new Date();
  target.setHours(hours, minutes, 0, 0);

  // If time has passed today, schedule for tomorrow
  if (target <= now) {
    target.setDate(target.getDate() + 1);
  }

  // Don't schedule for Friday/Saturday (skip to Sunday)
  const targetDow = target.getDay();
  if (targetDow === 5) target.setDate(target.getDate() + 2);
  else if (targetDow === 6) target.setDate(target.getDate() + 1);

  const msUntil = target.getTime() - now.getTime();

  // Don't schedule more than 24 hours out in a single setTimeout
  if (msUntil > 24 * 60 * 60 * 1000) return;

  reminderTimeout = setTimeout(() => {
    try {
      new Notification('🏋️ זמן להתאמן!', {
        body: 'אל תשכח את האימון שלך היום. קדימה, גוף בריא זה הכי חשוב!',
        icon: 'data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%233d5a42"%3E%3Cpath d="M20.57 14.86L22 13.43 20.57 12 17 15.57 8.43 7 12 3.43 10.57 2 9.14 3.43 7.71 2 5.57 4.14 4.14 2.71 2.71 4.14l1.43 1.43L2 7.71l1.43 1.43L2 10.57 3.43 12 7 8.43 15.57 17 12 20.57 13.43 22l1.43-1.43L16.29 22l2.14-2.14 1.43 1.43 1.43-1.43-1.43-1.43L22 16.29z"/%3E%3C/svg%3E',
      });
    } catch (e) {}
    scheduleReminder(); // Re-schedule for next day
  }, msUntil);
}

function showDemo(encodedQuery, exerciseName) {
  const guide = EXERCISE_GUIDES[exerciseName] || DEFAULT_GUIDE;
  const ytUrl = `https://www.youtube.com/results?search_query=${encodedQuery}`;

  const modal = document.createElement('div');
  modal.className = 'modal-overlay';
  modal.onclick = (e) => { if (e.target === modal) closeModal(); };

  modal.innerHTML = `
    <div class="modal">
      <button class="modal-close" onclick="closeModal()" aria-label="סגור">✕</button>
      <div class="modal-hero">
        <div class="modal-eyebrow">מדריך תרגיל</div>
        <div class="modal-title">${exerciseName}</div>
      </div>
      <div class="modal-diagram">${guide.svg}</div>
      <div class="modal-body">
        <div class="modal-section">
          <div class="modal-section-title">
            <span class="icon">📋</span>
            <span>שלבי ביצוע</span>
          </div>
          <ol class="modal-steps">
            ${guide.steps.map(s => `<li>${s}</li>`).join('')}
          </ol>
        </div>

        <div class="modal-section">
          <div class="modal-callout tip">
            <span class="emoji">💡</span>
            <div><strong>טיפ:</strong> ${guide.tip}</div>
          </div>
        </div>

        <div class="modal-section">
          <div class="modal-callout warn">
            <span class="emoji">⚠️</span>
            <div><strong>זהירות:</strong> ${guide.warn}</div>
          </div>
        </div>
      </div>
      <div class="modal-youtube">
        <button class="yt-btn" onclick="window.open('${ytUrl}', '_blank', 'noopener')">
          <svg viewBox="0 0 24 24"><path d="M23.5 6.2a3 3 0 0 0-2.1-2.1C19.5 3.6 12 3.6 12 3.6s-7.5 0-9.4.5A3 3 0 0 0 .5 6.2C0 8.1 0 12 0 12s0 3.9.5 5.8a3 3 0 0 0 2.1 2.1c1.9.5 9.4.5 9.4.5s7.5 0 9.4-.5a3 3 0 0 0 2.1-2.1c.5-1.9.5-5.8.5-5.8s0-3.9-.5-5.8zM9.6 15.6V8.4l6.2 3.6-6.2 3.6z"/></svg>
          צפה בסרטוני הדגמה ביוטיוב
        </button>
      </div>
    </div>
  `;

  document.body.appendChild(modal);
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  const modal = document.querySelector('.modal-overlay');
  if (modal) {
    modal.remove();
    document.body.style.overflow = '';
  }
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeModal();
});

// ============ INIT ============
(async () => {
  await loadState();
  render();
  scheduleReminder();

  // Register service worker for offline support and "install to home screen"
  if ('serviceWorker' in navigator) {
    try {
      await navigator.serviceWorker.register('service-worker.js');
    } catch (e) {
      console.log('Service worker registration deferred:', e.message);
    }
  }
})();
</script>
